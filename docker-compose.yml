version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: safemesh-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: safemesh_db
      MYSQL_USER: safemesh_user
      MYSQL_PASSWORD: safemesh_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "safemesh_user", "-p'safemesh_pass'"]
      timeout: 5s
      retries: 5
      interval: 10s

volumes:
  mysql-data:
